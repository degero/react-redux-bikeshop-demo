steps:
- script: npm ci
  displayName: 'npm install'

- script: CI=true npm run testci
  displayName: 'npm run testci'

- script: CI=true npm run build
  displayName: 'npm build'
  
# API build
- script: |
      npm install -g azure-functions-core-tools@4 --unsafe-perm true
  displayName: 'Install Azure Functions Core Tools'

- script: npm ci
  displayName: 'npm install api'
  workingDirectory: $(System.DefaultWorkingDirectory)/api

- script: |
    echo '{"IsEncrypted":false,"Values":{"AzureWebJobsStorage":"","FUNCTIONS_WORKER_RUNTIME":"node"}}' > local.settings.json
    mkdir -p $(System.DefaultWorkingDirectory)/package-api
    func pack . --no-build --output $(System.DefaultWorkingDirectory)/package-api
  displayName: 'func pack api'
  workingDirectory: $(System.DefaultWorkingDirectory)/api

- task: PublishTestResults@2
  displayName: 'Publish jest report'
  condition: succeededOrFailed()
  inputs:
    testResultsFiles: 'test-report.xml'